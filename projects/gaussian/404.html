<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
        // Do not perform automatic redirects from 404 pages. Show a simple message
        // instead so hosting environments don't inadvertently navigate to
        // hardcoded or generated redirect targets.
        (function () {
            document.body.innerHTML = '<p>404 - Not Found</p>';
        })();
    </script>
</head>
<body></body>
</html>
